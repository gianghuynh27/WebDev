<!-- a nav containing 4 buttons:

Home

Weather

Tasks

Notes

4 sections

only Home visible by default -->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <title>Personal Dashboard</title>
  </head>
  <body>
    <div>
      <nav>
        <button id="homeBtn">Home</button>
        <button id="weatherBtn">Weather</button>
        <button id="tasksBtn">Tasks</button>
        <button id="notesBtn">Notes</button>
      </nav>
      <main>
        <section id="homeSection">
          <p id="pageDate"></p>
          <h1 id="greeting"></h1>
          <!-- Later will import quote API to display inspirational quotes randomly -->
          <p>
            This is your home section where you can see an overview of your day.
          </p>
        </section>

        <section id="weatherSection">
          <h1>Weather Information</h1>
          <p>Check the current weather and forecast for your location.</p>
          <div class="weather-controls">
            <input type="text" id="cityInput" placeholder="Enter a city" />
            <button id="getWeatherBtn">Get Weather</button>
          </div>

          <div id="weatherResult"></div>
        </section>

        <section id="tasksSection">
          <h1>Your Tasks</h1>
          <div class="task-input">
            <input id="taskInput" type="text" placeholder="Add a new task..." />
            <button id="addTaskBtn">Add</button>
          </div>
          <ul id="taskList"></ul>
        </section>

        <section id="notesSection">
          <h1>Your Notes</h1>
          <p>Write down thoughts, reminders, or ideas.</p>

          <div class="notes-input-area">
            <textarea id="noteInput" placeholder="Write a note..."></textarea>
            <button id="addNoteBtn">Add Note</button>
          </div>

          <div id="notesList"></div>
        </section>
      </main>
    </div>
    <script src="script.js"></script>
  </body>
</html>
